<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA // TASK_HOUND (WEB VIEW)</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;800&display=swap');
        :root {
            --bg: #000000; --panel: #050505; --border: #1a1a1a;
            --green: #39ff14; --orange: #ff9900; --yellow: #ffff00; --red: #ff0000; --wire: #ffcc00;
        }
        body {
            background-color: var(--bg); color: #fff; font-family: 'Arial Rounded MT Bold', 'Nunito', sans-serif;
            margin: 0; padding: 20px; overflow-x: hidden;
        }
        
        /* ESTILOS DE LA BARRA SUPERIOR DE HERRAMIENTAS */
        .top-bar { display: flex; justify-content: space-between; align-items: center; border: 2px solid var(--border); background: var(--panel); padding: 10px 20px; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
        .sys-title { color: var(--wire); font-size: 16px; letter-spacing: 2px; }
        .sys-btn { background: var(--bg); border: 1px solid var(--green); color: var(--green); padding: 8px 15px; font-size: 12px; font-weight: bold; cursor: pointer; transition: all 0.2s; letter-spacing: 1px; }
        .sys-btn:hover { background: var(--green); color: var(--bg); box-shadow: 0 0 10px rgba(57, 255, 20, 0.3); }

        .board { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; align-items: start; }
        .column { background: var(--panel); border: 2px solid var(--border); padding: 10px; display: flex; flex-direction: column; gap: 10px; }
        .col-header { border: 2px solid var(--wire); text-align: center; padding: 8px 10px; margin-bottom: 10px; font-size: 16px; color: var(--wire); letter-spacing: 2px; position: relative; }
        .col-header::after { content: ''; display: block; height: 6px; width: calc(100% - 20px); position: absolute; bottom: 6px; left: 10px; }
        .col-por-hacer::after { background-color: #fff; }
        .col-en-espera::after { background-color: var(--red); }
        .col-en-progreso::after { background-color: var(--yellow); }
        .col-completado::after { background-color: var(--green); }
        
        .card { background: var(--bg); border: 2px solid; padding: 15px; position: relative; transition: transform 0.2s; }
        .card:hover { transform: translateY(-2px); }
        .card::before { content: ''; position: absolute; top: 2px; left: 2px; right: 2px; height: 4px; }
        .card.c-por-hacer { border-color: #444; } .card.c-por-hacer::before { background: #444; }
        .card.c-en-espera { border-color: var(--red); } .card.c-en-espera::before { background: var(--red); }
        .card.c-en-progreso { border-color: var(--yellow); } .card.c-en-progreso::before { background: var(--yellow); }
        .card.c-completado { border-color: var(--green); } .card.c-completado::before { background: var(--green); }
        
        .c-date { font-size: 11px; color: #aaa; margin-bottom: 8px; }
        .c-title { font-size: 16px; margin: 5px 0 15px 0; line-height: 1.2; }
        .c-progress { font-size: 13px; color: var(--green); margin-bottom: 15px; white-space: pre-line; }
        .c-indicators { background: var(--panel); border: 1px solid var(--border); padding: 8px; margin-bottom: 10px; font-size: 12px; }
        .c-btn { background: #ee9507; color: #000; text-align: center; padding: 5px; font-weight: bold; font-size: 12px; text-transform: uppercase; cursor: pointer; border: 1px solid transparent; transition: all 0.2s; }
        .c-btn:hover { background: #cc7a00; border-color: #fff; color: #fff; }
        .alert-red { color: var(--red); } .alert-orange { color: var(--orange); } .alert-green { color: var(--green); }
        
        /* ESTILOS DEL MODAL WEB */
        .modal-overlay { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(10, 10, 10, 0.9); overflow: auto; }
        .modal-content { background-color: var(--bg); margin: 5% auto; width: 90%; max-width: 650px; border: 2px solid #e60033; position: relative; padding-bottom: 20px; }
        .modal-dec-top { background-color: #e60033; height: 8px; margin: 20px 20px 0 20px; }
        .modal-dec-sub { background-color: #555588; height: 4px; margin: 2px 20px 0 20px; }
        .modal-header { padding: 20px 20px 10px 20px; display: flex; justify-content: space-between; align-items: flex-start; color: #e60033; border-bottom: 1px solid #1a1a1a; }
        .modal-title { font-size: 20px; text-transform: uppercase; }
        .close-btn { color: #555588; font-size: 28px; font-weight: bold; cursor: pointer; line-height: 1; }
        .close-btn:hover { color: #e60033; }
        .modal-body { padding: 20px; color: #fff; }
        .m-label { color: #8da9d4; font-size: 12px; margin-bottom: 5px; display: block; }
        .m-text { font-size: 14px; margin-bottom: 15px; }
        .m-desc { background-color: var(--panel); border: 1px solid #555588; padding: 15px; margin-top: 5px; margin-bottom: 20px; white-space: pre-wrap; font-family: monospace; color: #fff; font-size: 13px; }
        .m-step { background-color: var(--panel); border: 1px solid #555588; padding: 10px; margin-bottom: 10px; }
        .step-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 5px; font-size: 13px; }
        .step-bot { color: #8da9d4; font-size: 12px; display: flex; gap: 15px; }
        .st-ok { color: var(--green); } .st-wait { color: var(--red); }
    </style>
</head>
<body>
    <div class="top-bar">
        <div class="sys-title">SISTEMA // TASK_HOUND (WEB VIEW)</div>
        <div class="sys-btn" onclick="downloadReport()">[ DESCARGAR REPORTE EJECUTIVO ]</div>
    </div>

    <div class="board" id="board"></div>

    <!-- ESTRUCTURA DEL MODAL -->
    <div id="taskModal" class="modal-overlay" onclick="if(event.target === this) closeModal()">
        <div class="modal-content">
            <div class="modal-dec-top"></div>
            <div class="modal-dec-sub"></div>
            <div class="modal-header">
                <div class="modal-title" id="mTitle"></div>
                <span class="close-btn" onclick="closeModal()">[ X ]</span>
            </div>
            <div class="modal-body">
                <div style="display: flex; gap: 30px;">
                    <div>
                        <span class="m-label">ESTADO ACTUAL:</span>
                        <div class="m-text" id="mStatus" style="color: var(--yellow);"></div>
                    </div>
                    <div>
                        <span class="m-label">FECHA DE CREACIÓN:</span>
                        <div class="m-text" id="mDate"></div>
                    </div>
                </div>
                
                <span class="m-label">DESCRIPCIÓN GENERAL:</span>
                <div class="m-desc" id="mDesc"></div>
                
                <span class="m-label" style="color: #e60033; font-size: 14px; margin-bottom: 10px;">[ SECUENCIA DE PASOS ]</span>
                <div id="mSteps"></div>
            </div>
        </div>
    </div>

    <script>
        const tasks = [{"id": "66cad8fd-a1ea-43c1-b540-cd06a5e9ffe7", "titulo": "Comité TICs", "descripcion": "implementación del Comité TICs en el Departamento de Informática", "estado": "Por Hacer", "fecha_creacion": "2022/01/09", "fecha_actualizacion": "2026/04/21", "pasos": [{"nombre": "Línea de tiempo de licenciamiento", "area": "Jefatura Informática", "completado": false, "fecha_inicio": "2022/12/13 11:39", "fecha_fin": ""}]}, {"id": "5e7ff36f-abef-459d-92d8-455d496b8f6f", "titulo": "Implementación de Google Chat", "descripcion": "Aprobación de política de uso para Google Chat como herramienta de comunicación institucional", "estado": "En Espera", "fecha_creacion": "2024/09/24", "fecha_actualizacion": "2026/04/17", "pasos": [{"nombre": "Política propuesta", "area": "Jefatura Informática", "completado": false, "fecha_inicio": "2024/09/24 10:47", "fecha_fin": ""}]}, {"id": "459ef436-f671-4acc-b98c-98587eff692d", "titulo": "Apps adicionales a Workspace", "descripcion": "Configurar acceso y permisos a las aplicaciones incluídas en Workspace pero no cubiertas por el contrato pincipal de servicios", "estado": "En Espera", "fecha_creacion": "2024/09/30", "fecha_actualizacion": "2026/04/17", "pasos": []}, {"id": "878c6b21-c6ce-4a3c-9efd-3f55b18df9c3", "titulo": "Sitio Documentación", "descripcion": "Capacitación y uso del sitio kb.cobachbc.edu.mx", "estado": "En Espera", "fecha_creacion": "2025/03/13", "fecha_actualizacion": "2026/04/16", "pasos": [{"nombre": "Correo enviado", "area": "Jefatura Informática", "completado": false, "fecha_inicio": "2025-03-13 09:34", "fecha_fin": ""}]}, {"id": "a902be1e-bace-4d04-b4b5-47c4b6933b69", "titulo": "Propuesta de Política", "descripcion": "Para la administración y uso de las cuentas de correo institucional", "estado": "En Espera", "fecha_creacion": "2025/09/02", "fecha_actualizacion": "2026/04/16", "pasos": [{"nombre": "Propuesta presentada", "area": "Jefe Informática", "completado": false, "fecha_inicio": "2025-10-20 09:33", "fecha_fin": ""}]}, {"id": "aca8f830-9d09-4951-bde6-ad8d00b7185f", "titulo": "Licenciamiento alumnos", "descripcion": "Asignación de licencias Plus para población de alumnos", "estado": "En Espera", "pasos": [{"nombre": "Listado de matrículas para asignar", "area": "Servicios Educativos", "completado": false, "fecha_inicio": "2025/03/23", "fecha_fin": "2026/03/23"}], "fecha_creacion": "2025/10/07", "fecha_actualizacion": "2026/04/17"}];
        const estados = [
            { id: "Por Hacer", class: "col-por-hacer", name: "TAREAS" },
            { id: "En Espera", class: "col-en-espera", name: "EN ESPERA" },
            { id: "En Progreso", class: "col-en-progreso", name: "EN CURSO" },
            { id: "Completado", class: "col-completado", name: "COMPLETADAS" }
        ];

        function getDays(d1, d2) {
            return Math.max(0, Math.floor((d2 - d1) / (1000 * 60 * 60 * 24)));
        }

        function parseDate(dStr) {
            if (!dStr || dStr === "Desconocida") return null;
            return new Date(dStr.split(" ")[0].replace(/-/g, "/"));
        }

        const board = document.getElementById('board');
        const now = new Date();

        // RENDERIZADO DEL TABLERO
        estados.forEach(est => {
            const col = document.createElement('div');
            col.className = 'column';
            col.innerHTML = `<div class="col-header ${est.class}">${est.name}</div>`;
            
            const colTasks = tasks.filter(t => t.estado === est.id);
            colTasks.forEach(t => {
                let progressText = "";
                const pasos = t.pasos || [];
                const completados = pasos.filter(p => p.completado).length;
                if (pasos.length === 0) progressText = "PROGRESO: DESCONOCIDO";
                else {
                    const actual = pasos.find(p => !p.completado);
                    progressText = `PROGRESO: [${completados}/${pasos.length}]<br>`;
                    if (actual) progressText += `> ACTUAL: ${actual.nombre}<br>> ÁREA: ${actual.area}`;
                    else progressText += `> TODOS LOS PASOS COMPLETADOS`;
                }

                let indicatorsHtml = '';
                const cDate = parseDate(t.fecha_creacion);
                
                if (t.estado === "En Espera") {
                    let cDays = cDate ? getDays(cDate, now) : 0;
                    let lastDate = cDate;
                    pasos.forEach(p => {
                        const fIni = parseDate(p.fecha_inicio);
                        const fFin = parseDate(p.fecha_fin);
                        if (fIni && fIni > lastDate) lastDate = fIni;
                        if (fFin && fFin > lastDate) lastDate = fFin;
                    });
                    let aDays = lastDate ? getDays(lastDate, now) : cDays;
                    
                    let textInactividad = (pasos.length === 0 && aDays === 0) ? "SIN ACTUALIZACIONES" : `INACTIVIDAD : ${String(aDays).padStart(2, '0')} DÍAS`;
                    
                    indicatorsHtml = `
                        <div class="c-indicators">
                            <div class="${cDays > 7 ? 'alert-red' : 'alert-orange'}">ANTIGÜEDAD : ${String(cDays).padStart(2, '0')} DÍAS</div>
                            <div class="${aDays > 3 ? 'alert-red' : 'alert-orange'}">${textInactividad}</div>
                        </div>`;
                } else if (t.estado === "Completado") {
                    let uDate = parseDate(t.fecha_actualizacion);
                    let days = (cDate && uDate) ? getDays(cDate, uDate) : 0;
                    indicatorsHtml = `
                        <div class="c-indicators alert-green">
                            COMPLETADO EN : ${days > 0 ? String(days).padStart(2, '0') + ' DÍAS' : '< 24 HORAS'}
                        </div>`;
                }

                const cardClass = 'c-' + t.estado.toLowerCase().replace(' ', '-');
                
                const card = document.createElement('div');
                card.className = `card ${cardClass}`;
                card.innerHTML = `
                    <div class="c-date">CREACIÓN: ${t.fecha_creacion}</div>
                    ${indicatorsHtml}
                    <div class="c-title">${t.titulo.toUpperCase()}</div>
                    <div class="c-progress">${progressText}</div>
                    <div class="c-btn" onclick="openModal('${t.id}')">[ VER DETALLES ]</div>
                `;
                col.appendChild(card);
            });
            board.appendChild(col);
        });

        function openModal(id) {
            const t = tasks.find(x => x.id === id);
            if (!t) return;
            
            document.getElementById('mTitle').innerText = t.titulo;
            document.getElementById('mStatus').innerText = t.estado.toUpperCase();
            document.getElementById('mDate').innerText = t.fecha_creacion;
            document.getElementById('mDesc').innerText = t.descripcion || "[ SIN DESCRIPCIÓN ]";
            
            const stepsContainer = document.getElementById('mSteps');
            stepsContainer.innerHTML = '';
            
            if (!t.pasos || t.pasos.length === 0) {
                stepsContainer.innerHTML = '<div style="color: gray;">[ SIN PASOS REGISTRADOS ]</div>';
            } else {
                t.pasos.forEach((p, idx) => {
                    const isOk = p.completado;
                    const icon = isOk ? '<span class="st-ok">[ OK ]</span>' : '<span class="st-wait">[ WAIT ]</span>';
                    const stepHtml = `
                        <div class="m-step">
                            <div class="step-top">
                                <span>PASO ${idx + 1} // ${p.nombre} [ÁREA: ${p.area}]</span>
                                ${icon}
                            </div>
                            <div class="step-bot">
                                <span>INICIO: ${p.fecha_inicio || '--'}</span>
                                <span>FIN: ${p.fecha_fin || '--'}</span>
                            </div>
                        </div>
                    `;
                    stepsContainer.innerHTML += stepHtml;
                });
            }
            
            document.getElementById('taskModal').style.display = 'block';
            document.body.style.overflow = 'hidden'; 
        }

        function closeModal() {
            document.getElementById('taskModal').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        // NUEVO: GENERADOR DE REPORTE HTML FORMATO DOCUMENTO IMPRIMIBLE
        function downloadReport() {
            const now = new Date();
            const yyyy = now.getFullYear();
            const mm = String(now.getMonth() + 1).padStart(2, '0');
            const dd = String(now.getDate()).padStart(2, '0');
            const hh = String(now.getHours()).padStart(2, '0');
            const min = String(now.getMinutes()).padStart(2, '0');
            const dateStr = yyyy + '/' + mm + '/' + dd + ' ' + hh + ':' + min;

            let enEspera = 0, enCurso = 0, porHacer = 0;
            tasks.forEach(t => {
                if (t.estado === "En Espera") enEspera++;
                if (t.estado === "En Progreso") enCurso++;
                if (t.estado === "Por Hacer") porHacer++;
            });

            let doc = `<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Reporte de Estado - Task Hound</title>
    <style>
        body { font-family: Arial, sans-serif; line-height: 1.6; color: #222; max-width: 800px; margin: 40px auto; padding: 20px; }
        h1 { color: #111; border-bottom: 3px solid #e60033; padding-bottom: 10px; text-transform: uppercase; }
        h2 { color: #333; margin-top: 30px; border-bottom: 2px solid #ccc; padding-bottom: 5px; text-transform: uppercase; font-size: 1.3em; }
        h3 { color: #0056b3; margin-bottom: 5px; text-transform: uppercase; font-size: 1.1em;}
        .summary { background: #f8f9fa; padding: 20px; border-left: 5px solid #ee9507; margin-bottom: 30px; }
        .summary h2 { margin-top: 0; border: none; padding: 0; }
        .summary ul { list-style-type: none; padding-left: 0; font-size: 1.1em; }
        .task-meta { font-size: 0.9em; color: #666; margin-bottom: 10px; }
        .desc { background: #f4f4f4; padding: 15px; border-left: 3px solid #ccc; white-space: pre-wrap; font-family: Georgia, serif; }
        .steps { margin-top: 15px; }
        ul.checklist { list-style-type: none; padding-left: 0; }
        ul.checklist li { margin-bottom: 5px; }
        .checkbox { font-family: monospace; font-weight: bold; font-size: 1.1em; margin-right: 8px; }
        .st-ok { color: #2eb810; }
        .st-wait { color: #e60033; }
        hr { border: 0; border-top: 1px dashed #ddd; margin: 30px 0; }
    </style>
</head>
<body>
    <h1>TASK HOUND // REPORTE DE ESTADO</h1>
    <p><strong>FECHA DE CORTE:</strong> ` + dateStr + `</p>
    
    <div class="summary">
        <h2>Resumen Ejecutivo</h2>
        <ul>
            <li>🔴 <strong>En Espera:</strong> ` + enEspera + `</li>
            <li>🟡 <strong>En Curso:</strong> ` + enCurso + `</li>
            <li>⚪ <strong>Por Hacer:</strong> ` + porHacer + `</li>
        </ul>
    </div>`;

            estados.forEach(est => {
                if (est.id === "Completado") return; // Omitir completadas
                
                const cols = tasks.filter(t => t.estado === est.id);
                if (cols.length === 0) return;

                doc += `<h2>[ ` + est.name + ` ]</h2>`;
                cols.forEach(t => {
                    doc += `<h3>🔹 ` + t.titulo + `</h3>`;
                    doc += `<div class="task-meta"><strong>Creación:</strong> ` + (t.fecha_creacion || 'Desconocida') + ` | <strong>Última Act:</strong> ` + (t.fecha_actualizacion || 'Desconocida') + `</div>`;
                    
                    if (t.descripcion) {
                        doc += `<div class="desc">` + t.descripcion + `</div>`;
                    }
                    
                    if (t.pasos && t.pasos.length > 0) {
                        doc += `<div class="steps"><strong>Seguimiento:</strong><ul class="checklist">`;
                        t.pasos.forEach((p, i) => {
                            const marca = p.completado ? '<span class="checkbox st-ok">[ X ]</span>' : '<span class="checkbox st-wait">[ &nbsp; ]</span>';
                            doc += `<li>` + marca + ` Paso ` + (i+1) + `: ` + p.nombre + ` <em>(Área: ` + p.area + `)</em></li>`;
                        });
                        doc += `</ul></div>`;
                    }
                    doc += `<hr>`;
                });
            });

            doc += `</body></html>`;

            // Descargar como documento HTML
            const blob = new Blob([doc], { type: 'text/html;charset=utf-8;' });
            const link = document.createElement("a");
            const url = URL.createObjectURL(blob);
            link.setAttribute("href", url);
            link.setAttribute("download", "TaskHound_ReporteEjecutivo_" + yyyy + mm + dd + ".html");
            link.style.visibility = 'hidden';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
    </script>
</body>
</html>
